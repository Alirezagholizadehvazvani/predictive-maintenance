paths:
  raw_data: data/raw/training_data.csv
  processed_data: data/processed/training_data.csv
  model_output: models/trained_model.pkl
  metrics_output: data/processed/metrics.json

ml_model:
  model_type: RandomForest
  features:
    - vibration
    - temperature
    - current
    - pressure
    - state_encoded
  target: label
  test_size: 0.2
  random_state: 42
  model_params:
    n_estimators: 100
    max_depth: 10

dashboard:
  host: 0.0.0.0
  port: 5000
  debug: true
